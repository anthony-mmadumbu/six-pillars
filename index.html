    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { margin: 0; padding: 0; background: #F7F2E7; overscroll-behavior-y: contain; }

  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600&display=swap');

  .slide-up { animation: slideUp 0.35s cubic-bezier(.4,.0,.2,1); }
  .toast-in { animation: toastIn 0.3s cubic-bezier(.4,.0,.2,1); }

  @keyframes aiPulse { 0%, 100% { opacity: 0.25; transform: scale(0.8); } 50% { opacity: 1; transform: scale(1); } }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes slideIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes slideUp { from { opacity: 0; transform: translateY(40px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes toastIn { from { opacity: 0; transform: translate(-50%, 20px); } to { opacity: 1; transform: translate(-50%, 0); } }
  button { font-family: inherit; cursor: pointer; }
  button:disabled { cursor: default; }
  input { font-family: inherit; }

  /* ---- Responsive layout ---- */
  /* Mobile-first: container is narrow, single-column. */
  .sp-container { max-width: 480px; margin: 0 auto; padding-left: 16px; padding-right: 16px; }
  .sp-main { padding-top: 18px; padding-bottom: 32px; }
  .sp-header-pad { padding-top: 14px; padding-bottom: 12px; }

  /* Two-column grid utility (used on tablets/desktop only) */
  .sp-grid-2 { display: grid; grid-template-columns: 1fr; gap: 10px; }
  .sp-pillar-list { display: flex; flex-direction: column; gap: 10px; }

  /* Bottom nav: full width on mobile, anchored to viewport edges */
  .sp-bottom-nav-wrap { position: fixed; bottom: 0; left: 0; right: 0; padding-left: env(safe-area-inset-left); padding-right: env(safe-area-inset-right); padding-bottom: env(safe-area-inset-bottom); background: #F7F2E7F0; backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-top: 1px solid #E8E2D4; z-index: 20; }
  .sp-bottom-nav { max-width: 480px; margin: 0 auto; display: flex; justify-content: space-around; padding: 10px 8px 14px; }

  /* Tablet: 600px+ — wider container, larger touch targets, two-column pillar grid */
  @media (min-width: 600px) {
    .sp-container { max-width: 720px; padding-left: 24px; padding-right: 24px; }
    .sp-main { padding-top: 24px; padding-bottom: 40px; }
    .sp-pillar-list { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
    .sp-grid-2 { grid-template-columns: repeat(2, 1fr); gap: 12px; }
    .sp-bottom-nav { max-width: 600px; }
    .sp-cal-cell-num { font-size: 14px !important; }
  }

  /* Desktop: 960px+ — even wider, three-column pillar grid */
  @media (min-width: 960px) {
    .sp-container { max-width: 1040px; padding-left: 32px; padding-right: 32px; }
    .sp-pillar-list { grid-template-columns: repeat(3, 1fr); gap: 14px; }
    .sp-grid-2 { grid-template-columns: repeat(3, 1fr); }
    .sp-bottom-nav { max-width: 720px; }
    .sp-summary-card { padding: 28px 32px !important; }
    .sp-summary-num { font-size: 56px !important; }
    .sp-big-stat-num { font-size: 72px !important; }
  }

  /* Very wide: 1280px+ — cap so it doesn't sprawl */
  @media (min-width: 1280px) {
    .sp-container { max-width: 1200px; }
    .sp-pillar-list { grid-template-columns: repeat(4, 1fr); }
  }

  /* Modal: bottom sheet on mobile, centered card on tablet+ */
  .sp-modal-overlay { position: fixed; inset: 0; background: #1F1B1480; backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px); display: flex; align-items: flex-end; justify-content: center; z-index: 50; }
  .sp-modal-sheet { width: 100%; max-width: 480px; max-height: 92vh; background: #F7F2E7; border-radius: 24px 24px 0 0; display: flex; flex-direction: column; overflow: hidden; }
  @media (min-width: 600px) {
    .sp-modal-overlay { align-items: center; padding: 24px; }
    .sp-modal-sheet { max-width: 560px; max-height: 80vh; border-radius: 24px; }
  }

  /* Calendar cells stay square but get bigger on larger screens */
  .sp-cal-cell-num { font-size: 13px; }

  /* Backup buttons stack on mobile, side-by-side on tablet+ */
  .sp-backup-row { display: flex; flex-direction: column; gap: 8px; margin-bottom: 10px; }
  @media (min-width: 600px) {
    .sp-backup-row { flex-direction: row; }
    .sp-backup-row > button { flex: 1; }
  }

  /* Touch-friendly: min 44px tap target on small screens */
  @media (max-width: 599px) {
    .sp-tap { min-height: 44px; }
  }
