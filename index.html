function scoreMeal(name) {
  const text = (name || '').toLowerCase();
  if (!text.trim()) return { score: 3, reasons: [] };
  let score = 3;
  const reasons = [];
  for (const [key, rule] of Object.entries(MEAL_RULES)) {
    for (const word of rule.words) {
      if (text.includes(word)) {
        score += rule.points;
        reasons.push({ word, points: rule.points });
        break;
      }
    }
  }
  score = Math.max(1, Math.min(5, score));
  score = Math.round(score * 2) / 2;
  return { score, reasons };
}

  if (mins < 60) return `${mins}m`;
  const h = Math.floor(mins / 60); const m = mins % 60;
  return m === 0 ? `${h}h` : `${h}h ${m}m`;
};

// ============ Migration / merge helpers ============
// When loading saved data, merge with defaults so new pillars appear without wiping old data
function mergePillars(saved) {
  if (!Array.isArray(saved) || saved.length === 0) return DEFAULT_PILLARS;
  // Keep saved pillars but ensure each has the fields current code expects
  return saved.map(p => ({
    tracksTime: false,
    isMealPillar: false,
    color: '#5B6CFF',
    emoji: '✨',
    name: 'Pillar',
    id: `p_${Date.now()}`,
    ...p,
  }));
}

function HabitTracker() {
  const [pillars, setPillars] = useState(DEFAULT_PILLARS);
  const [entries, setEntries] = useState({});
  const [meals, setMeals] = useState({});
  // Use startOfDay to avoid timestamp comparison bugs
  const [today, setToday] = useState(() => startOfDay(new Date()));
  const [selectedDate, setSelectedDate] = useState(() => startOfDay(new Date()));
  const [view, setView] = useState('today');
  const [loading, setLoading] = useState(true);
  const [noteEditor, setNoteEditor] = useState(null);
  const [timeEditor, setTimeEditor] = useState(null);
  const [mealModalOpen, setMealModalOpen] = useState(false);
  const [toast, setToast] = useState(null);

  // Refresh "today" if app is left open across midnight
  useEffect(() => {
    const interval = setInterval(() => {
      const newToday = startOfDay(new Date());
      if (!sameDay(newToday, today)) setToday(newToday);
    }, 60000); // check every minute
    return () => clearInterval(interval);
  }, [today]);

  useEffect(() => {
    const p = safeGet(STORAGE.pillars); if (p) setPillars(mergePillars(p));
    const e = safeGet(STORAGE.entries); if (e) setEntries(e);
    const m = safeGet(STORAGE.meals); if (m) setMeals(m);
      setLoading(false);
  }, []);

  const showToast = (msg) => {
    setToast(msg);
    setTimeout(() => setToast(null), 2400);
  };

  const savePillars = (n) => { setPillars(n); safeSet(STORAGE.pillars, n); };
  const saveEntries = (n) => { setEntries(n); safeSet(STORAGE.entries, n); };
  const saveMeals   = async (n) => { setMeals(n);   safeSet(STORAGE.meals, n); };

  const dateKey = fmt(selectedDate);
  const dayData = entries[dateKey] || {};
  const dayMeals = meals[dateKey] || [];

  const togglePillar = (pillarId) => {
    const cur = dayData[pillarId];
    const next = { ...entries };
    if (!next[dateKey]) next[dateKey] = {};
    if (!cur) next[dateKey][pillarId] = { done: true, note: '', minutes: 0 };
    else if (cur.done === true) next[dateKey][pillarId] = { ...cur, done: false };
    else {
      delete next[dateKey][pillarId];
      if (Object.keys(next[dateKey]).length === 0) delete next[dateKey];
    }
    saveEntries(next);
  };

  const updateField = (pillarId, patch) => {
    const next = { ...entries };
    if (!next[dateKey]) next[dateKey] = {};
    const existing = next[dateKey][pillarId] || { done: null, note: '', minutes: 0 };
    next[dateKey][pillarId] = { ...existing, ...patch };
    saveEntries(next);
  };

  const addMeal = (name) => {
    if (!name.trim()) return;
    const { score } = scoreMeal(name);
    const meal = {
      id: `m_${Date.now()}`,
      time: new Date().toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' }),
      name: name.trim(), score, manualScore: null,
    };
    const next = { ...meals, [dateKey]: [...dayMeals, meal] };
    saveMeals(next);
  };
  const updateMeal = (id, patch) => {
    const next = { ...meals, [dateKey]: dayMeals.map(m => m.id === id ? { ...m, ...patch } : m) };
    saveMeals(next);
  };
  const deleteMeal = (id) => {
    const filtered = dayMeals.filter(m => m.id !== id);
    const next = { ...meals };
    if (filtered.length) next[dateKey] = filtered; else delete next[dateKey];
    saveMeals(next);
  };

  const dayMealAvg = useMemo(() => {
    if (!dayMeals.length) return null;
    const total = dayMeals.reduce((s, m) => s + (m.manualScore ?? m.score), 0);
    return total / dayMeals.length;
  }, [dayMeals]);

  // ============ Export / Import ============
  const exportData = () => {
    const payload = {
      app: 'SixPillars',
      version: 2,
      exportedAt: new Date().toISOString(),
      pillars, entries, meals,
    };
    const json = JSON.stringify(payload, null, 2);
    const blob = new Blob([json], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `six-pillars-backup-${fmt(new Date())}.json`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    showToast('Backup downloaded');
  };

  const importData = async (file) => {
    try {
      const text = await file.text();
      const data = JSON.parse(text);
      if (data.app !== 'SixPillars') {
        showToast('Not a Six Pillars backup file');
        return;
      }
      // Merge strategy: imported data overrides existing where keys match
      const mergedEntries = { ...entries, ...(data.entries || {}) };
      const mergedMeals = { ...meals, ...(data.meals || {}) };
      const importedPillars = mergePillars(data.pillars || []);
      savePillars(importedPillars);
      saveEntries(mergedEntries);
      saveMeals(mergedMeals);
      showToast('Backup restored');
    } catch (e) {
      showToast('Import failed — invalid file');
    }
  };

  const computeStreak = (pillarId) => {
    let streak = 0;
    let d = new Date(today);
    const todayKey = fmt(today);
    const todayDone = entries[todayKey]?.[pillarId]?.done === true;
    if (!todayDone) d = addDays(d, -1);
    while (true) {
      const k = fmt(d);
      if (entries[k]?.[pillarId]?.done === true) { streak++; d = addDays(d, -1); }
      else break;
      if (streak > 999) break;
    }
    if (todayDone) streak++;
    return streak;
  };

  const monthlyConsistency = useMemo(() => {
    const year = today.getFullYear(); const month = today.getMonth();
    const dayOfMonth = today.getDate();
    const result = {};
    pillars.forEach(p => {
      let done = 0; let totalMinutes = 0;
      for (let i = 1; i <= dayOfMonth; i++) {
        const k = fmt(new Date(year, month, i));
        const e = entries[k]?.[p.id];
        if (e?.done === true) done++;
        if (e?.minutes) totalMinutes += e.minutes;
      }
      result[p.id] = { done, total: dayOfMonth, totalMinutes };
    });
    return result;
  }, [entries, pillars, today]);

  const last30 = useMemo(() => {
    const arr = [];
    for (let i = 29; i >= 0; i--) {
      const d = addDays(today, -i);
      const k = fmt(d);
      const dayEntry = entries[k] || {};
      const doneCount = pillars.filter(p => dayEntry[p.id]?.done === true).length;
      arr.push({ date: d, key: k, doneCount, total: pillars.length });
    }
    return arr;
  }, [entries, pillars, today]);

  if (loading) return <div style={styles.loading}>Loading your tracker…</div>;

  return (
    <div style={styles.app}>
      
      <Header today={today} selectedDate={selectedDate} setSelectedDate={setSelectedDate} view={view} />
      <main style={styles.main} className="sp-container sp-main">
        {view === 'today' && (
          <TodayView
            pillars={pillars} dayData={dayData} dayMeals={dayMeals} dayMealAvg={dayMealAvg}
            togglePillar={togglePillar} updateField={updateField}
            computeStreak={computeStreak} selectedDate={selectedDate} today={today}
            setSelectedDate={setSelectedDate}
            noteEditor={noteEditor} setNoteEditor={setNoteEditor}
            timeEditor={timeEditor} setTimeEditor={setTimeEditor}
            setMealModalOpen={setMealModalOpen}
          />
        )}
        {view === 'trends'   && <TrendsView pillars={pillars} monthlyConsistency={monthlyConsistency} last30={last30} computeStreak={computeStreak} meals={meals} today={today} entries={entries} />}
        {view === 'calendar' && <CalendarView pillars={pillars} entries={entries} selectedDate={selectedDate} setSelectedDate={setSelectedDate} setView={setView} today={today} />}
        {view === 'settings' && <SettingsView pillars={pillars} savePillars={savePillars} exportData={exportData} importData={importData} />}
      </main>
      <BottomNav view={view} setView={setView} />
      {mealModalOpen && (
        <MealModal
          dayMeals={dayMeals} dayMealAvg={dayMealAvg}
          onAdd={addMeal} onUpdate={updateMeal} onDelete={deleteMeal}
          onClose={() => setMealModalOpen(false)}
          isToday={sameDay(today, selectedDate)}
          dateLabel={selectedDate.toLocaleDateString('en-GB', { weekday: 'long', day: 'numeric', month: 'long' })}
        />
      )}
      {toast && <div style={styles.toast} className="toast-in">{toast}</div>}
    </div>
  );
}

function TimeEditor({ minutes, onChange, onClose }) {
  const initialH = Math.floor((minutes || 0) / 60);
  const initialM = (minutes || 0) % 60;
  const [h, setH] = useState(initialH);
  const [m, setM] = useState(initialM);
  const wrapRef = useRef(null);

  const commit = (nextH, nextM) => {
    const clampedH = Math.max(0, Math.min(23, nextH || 0));
    const clampedM = Math.max(0, Math.min(59, nextM || 0));
    onChange(clampedH * 60 + clampedM);
  };

  // Close when tapping outside the editor
  useEffect(() => {
    const handleClick = (e) => {
      if (wrapRef.current && !wrapRef.current.contains(e.target)) onClose();
    };
    document.addEventListener('mousedown', handleClick);
    document.addEventListener('touchstart', handleClick);
    return () => {
      document.removeEventListener('mousedown', handleClick);
      document.removeEventListener('touchstart', handleClick);
    };
  }, [onClose]);

  return (
    <div ref={wrapRef} style={styles.timeEditWrap}>
      <Clock size={12} color="#8B7E6B" />
      <input
        autoFocus type="number" min="0" max="23" inputMode="numeric"
        value={h || ''} placeholder="0"
        onChange={(e) => { const v = parseInt(e.target.value) || 0; setH(v); commit(v, m); }}
        onKeyDown={(e) => e.key === 'Enter' && onClose()}
        style={styles.timeInput}
      />
      <span style={styles.timeUnit}>h</span>
      <input
        type="number" min="0" max="59" inputMode="numeric"
        value={m || ''} placeholder="0"
        onChange={(e) => { const v = parseInt(e.target.value) || 0; setM(v); commit(h, v); }}
        onKeyDown={(e) => e.key === 'Enter' && onClose()}
        style={styles.timeInput}
      />
      <span style={styles.timeUnit}>m</span>
    </div>
  );
}

function StarRow({ value, size = 14 }) {
  return (
    <div style={{ display: 'flex', alignItems: 'center', gap: 1 }}>
      {[1, 2, 3, 4, 5].map(n => {

        return (
          <span key={n} style={{ position: 'relative', display: 'inline-flex' }}>
            <Star size={size} fill={filled ? '#1F1B14' : 'transparent'} color="#1F1B14" strokeWidth={1.5} />
            {half && (
              <span style={{ position: 'absolute', left: 0, top: 0, width: '50%', overflow: 'hidden', display: 'inline-flex' }}>
                <Star size={size} fill="#1F1B14" color="#1F1B14" strokeWidth={1.5} />
              </span>
            )}
          </span>
        );
      })}
    </div>
  );
}
function StarMini({ value }) {
  return <span style={{ fontSize: 10, fontWeight: 600, color: '#5C5240', marginLeft: 2 }}>{value.toFixed(1)}★</span>;
}

function RingProgress({ pct }) {
  const r = 28; const c = 2 * Math.PI * r; const dash = (pct / 100) * c;
  return (
    <svg width="72" height="72" style={{ transform: 'rotate(-90deg)' }}>
      <circle cx="36" cy="36" r={r} fill="none" stroke="#E8E2D4" strokeWidth="6" />
      <circle cx="36" cy="36" r={r} fill="none" stroke="#1F1B14" strokeWidth="6" strokeLinecap="round" strokeDasharray={`${dash} ${c}`} style={{ transition: 'stroke-dasharray 0.6s cubic-bezier(.4,.0,.2,1)' }} />
    </svg>
  );
}

// ============ AI Monthly Summary ============
function AISummaryCard({ pillars, monthlyConsistency, mealStats, last30, entries, meals, today, computeStreak }) {
  const [status, setStatus] = useState('idle'); // idle | loading | done | error
  const [summary, setSummary] = useState('');

  const buildPrompt = () => {
    const year = today.getFullYear();
    const month = today.toLocaleDateString('en-GB', { month: 'long', year: 'numeric' });
    const dayOfMonth = today.getDate();

    // Per-pillar stats
    const pillarLines = pillars.map(p => {
      const c = monthlyConsistency[p.id];
      const pct = c.total ? Math.round((c.done / c.total) * 100) : 0;
      const streak = computeStreak(p.id);
      const timeNote = p.tracksTime && c.totalMinutes > 0 ? `, ${Math.round(c.totalMinutes / 60 * 10) / 10}h total time logged` : '';
      return `- ${p.emoji} ${p.name}: ${c.done}/${c.total} days (${pct}%)${timeNote}, current streak: ${streak} days`;
    }).join('\n');

    // Meal breakdown
    let mealLines = 'No meals logged this month.';
    if (mealStats.totalMeals > 0) {
      // Gather all meals this month
      const allMeals = [];
      for (let i = 1; i <= dayOfMonth; i++) {
        const k = `${year}-${String(today.getMonth() + 1).padStart(2,'0')}-${String(i).padStart(2,'0')}`;
        (meals[k] || []).forEach(m => allMeals.push({ name: m.name, score: m.manualScore ?? m.score }));
      }
      const lowMeals = allMeals.filter(m => m.score <= 2).map(m => m.name).slice(0, 5);
      const highMeals = allMeals.filter(m => m.score >= 4).map(m => m.name).slice(0, 5);
      mealLines = `Total meals logged: ${mealStats.totalMeals} across ${mealStats.daysLogged} days\nAverage meal quality: ${mealStats.avgScore.toFixed(2)}/5\nBest meals: ${highMeals.join(', ') || 'none'}\nWorst meals: ${lowMeals.join(', ') || 'none'}`;
    }

    // Last 30 days trend
    const last7 = last30.slice(-7);
    const last7avg = last7.reduce((s, d) => s + d.doneCount, 0) / (7 * pillars.length);
    const first7 = last30.slice(0, 7);
    const first7avg = first7.reduce((s, d) => s + d.doneCount, 0) / (7 * pillars.length);
    const trend = last7avg > first7avg ? 'improving' : last7avg < first7avg ? 'declining' : 'flat';

    return `You are a brutally honest personal habit coach. No softening. No motivation fluff. Just cold analysis of the numbers and direct statements about what they mean.

The user tracks 7 life pillars daily. Here is their data for ${month} (${dayOfMonth} days tracked so far):

PILLAR PERFORMANCE:
${pillarLines}

MEAL TRACKING:
${mealLines}

TREND: Performance over last 30 days is ${trend} (first week avg: ${Math.round(first7avg * 100)}%, last week avg: ${Math.round(last7avg * 100)}%).

Write a monthly performance summary. Structure it as:

1. VERDICT (1-2 sentences, overall honest assessment of the month)
2. WHAT'S WORKING (pillars above 70% — be brief, don't over-praise)
3. WHAT'S NOT WORKING (pillars below 50% — be specific and direct about what the numbers show)
4. MEAL ANALYSIS (honest assessment of eating habits based on the data)
5. THE REAL ISSUE (identify the single biggest pattern holding them back)
6. NEXT MONTH: 3 SPECIFIC TARGETS (concrete, measurable, no vague advice)

Be direct. If they only went to the gym 4 times, say they went to the gym 4 times. Don't say "there's room for improvement." Say what the number actually means. Keep the whole thing under 350 words.`;
  };

  const generate = async () => {
    setStatus('loading');
    setSummary('');
    try {
      const response = await fetch('https://six-pillars-api.chidubem-anthony.workers.dev', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          messages: [{ role: 'user', content: buildPrompt() }],
        }),
      });
      const data = await response.json();
      if (data?.content?.[0]?.text) {
        setSummary(data.content[0].text);
        setStatus('done');
      } else {
        setStatus('error');
      }
    } catch (e) {
      setStatus('error');
    }
  };

  return (
    <div style={styles.aiCard}>
      <div style={styles.aiCardHeader}>
        <div>
          <div style={styles.aiCardTitle}>
            <Sparkles size={14} style={{ marginRight: 6, color: '#FF6B4A' }} />
            AI Monthly Verdict
          </div>
          <div style={styles.aiCardSub}>Brutally honest analysis of your data</div>
        </div>
        {status === 'done' && (
          <button onClick={generate} style={styles.aiRegenBtn} title="Regenerate">
            <RefreshCw size={14} />
          </button>
        )}
      </div>

      {status === 'idle' && (
        <button onClick={generate} style={styles.aiGenerateBtn}>
          <Sparkles size={14} style={{ marginRight: 6 }} />
          Generate this month's verdict
        </button>
      )}

      {status === 'loading' && (
        <div style={styles.aiLoading}>
          <div style={styles.aiLoadingDots}>
            <span className="ai-dot" />
            <span className="ai-dot" style={{ animationDelay: '0.2s' }} />
            <span className="ai-dot" style={{ animationDelay: '0.4s' }} />
          </div>
          <div style={styles.aiLoadingText}>Analysing your month…</div>
        </div>
      )}

      {status === 'error' && (
        <div style={styles.aiError}>
          <div style={{ marginBottom: 10, fontSize: 13, color: '#A1402F' }}>Failed to generate. Check your connection and try again.</div>
          <button onClick={generate} style={styles.aiGenerateBtn}>Try again</button>
        </div>
      )}

      {status === 'done' && summary && (
        <div style={styles.aiSummaryText}>
          {summary.split('\n').map((line, i) => {
            const isHeading = /^\d+\.\s+[A-Z\s:]+$/.test(line.trim()) || /^[A-Z\s:]{4,}$/.test(line.trim());
            if (!line.trim()) return <div key={i} style={{ height: 8 }} />;
            if (isHeading) return <div key={i} style={styles.aiSummaryHeading}>{line}</div>;
            return <div key={i} style={styles.aiSummaryLine}>{line}</div>;
          })}
        </div>
      )}
    </div>
  );
}

function TrendsView({ pillars, monthlyConsistency, last30, computeStreak, meals, today, entries }) {
  const [drillPillar, setDrillPillar] = useState(null);
  const totalPossible = last30.length * pillars.length;
  const totalDone = last30.reduce((s, d) => s + d.doneCount, 0);
  const overall = totalPossible ? Math.round((totalDone / totalPossible) * 100) : 0;

  const mealStats = useMemo(() => {
    const year = today.getFullYear(); const month = today.getMonth();
    const dayOfMonth = today.getDate();
    let totalMeals = 0; let totalScore = 0; let daysLogged = 0;
    for (let i = 1; i <= dayOfMonth; i++) {
      const k = fmt(new Date(year, month, i));
      const dayMs = meals[k] || [];
      if (dayMs.length) {
        daysLogged++;
        dayMs.forEach(m => { totalMeals++; totalScore += (m.manualScore ?? m.score); });
      }
    }
    return { totalMeals, avgScore: totalMeals ? totalScore / totalMeals : null, daysLogged };
  }, [meals, today]);

  return (
    <div className="fade-in">
      <div style={styles.sectionTitle}>Last 30 days</div>
      <div style={styles.bigStatCard}>
        <div style={styles.bigStatLabel}>Overall consistency</div>
        <div style={styles.bigStatNum} className="sp-big-stat-num">{overall}<span style={styles.bigStatPct}>%</span></div>
        <Sparkline data={last30} pillars={pillars} />
      </div>

      {mealStats.totalMeals > 0 && (
        <>
          <div style={styles.sectionTitle}>Meals this month</div>
          <div style={styles.mealStatsCard}>
            <div style={styles.mealStatItem}>
              <div style={styles.mealStatValue}>{mealStats.totalMeals}</div>
              <div style={styles.mealStatLabel}>logged</div>
            </div>
            <div style={styles.mealStatDivider} />
            <div style={styles.mealStatItem}>
              <div style={styles.mealStatValue}>
                {mealStats.avgScore.toFixed(1)}
                <Star size={14} fill="#F7F2E7" color="#F7F2E7" style={{ marginLeft: 3, marginBottom: 3 }} />
              </div>
              <div style={styles.mealStatLabel}>avg quality</div>
            </div>
            <div style={styles.mealStatDivider} />
            <div style={styles.mealStatItem}>
              <div style={styles.mealStatValue}>{mealStats.daysLogged}</div>
              <div style={styles.mealStatLabel}>days tracked</div>
            </div>
          </div>
        </>
      )}

      <div style={styles.sectionTitle}>This month by pillar <span style={styles.tapHint}>· tap any pillar for details</span></div>
      <div style={styles.pillarStats}>
        {pillars.map(p => {
          const c = monthlyConsistency[p.id];
          const pct = c.total ? Math.round((c.done / c.total) * 100) : 0;
          const streak = computeStreak(p.id);
          return (
            <button key={p.id} style={styles.statCardBtn} onClick={() => setDrillPillar(p)}>
              <div style={styles.statHeader}>
                <div style={styles.statTitle}>
                  <span style={{ ...styles.statEmoji, background: `${p.color}20` }}>{p.emoji}</span>
                  <span>{p.name}</span>
                </div>
                <div style={styles.statPctBig}>{pct}%</div>
              </div>
              <div style={styles.statBar}>
                <div style={{ ...styles.statBarFill, width: `${pct}%`, background: p.color }} />
              </div>
              <div style={styles.statFooter}>
                <span>{c.done} of {c.total} days</span>
                <div style={{ display: 'flex', gap: 10 }}>
                  {p.tracksTime && c.totalMinutes > 0 && (
                    <span style={styles.statTime}><Clock size={10} />{fmtMinutes(c.totalMinutes)}</span>
                  )}
                  {streak > 0 && <span style={styles.statStreak}><Flame size={11} /> {streak}</span>}
                </div>
              </div>
            </button>
          );
        })}
      </div>

      <div style={{ marginTop: 24 }}>
        <AISummaryCard
          pillars={pillars}
          monthlyConsistency={monthlyConsistency}
          mealStats={mealStats}
          last30={last30}
          entries={entries}
          meals={meals}
          today={today}
          computeStreak={computeStreak}
        />
      </div>
      {drillPillar && (
        <PillarDrillDown
          pillar={drillPillar}
          entries={entries}
          meals={meals}
          today={today}
          computeStreak={computeStreak}
          onClose={() => setDrillPillar(null)}
        />
      )}
    </div>
  );
}

function PillarDrillDown({ pillar, entries, meals, today, computeStreak, onClose }) {
  const [range, setRange] = useState('month'); // month | 30days | all

  // Compute date list for selected range
  const dates = useMemo(() => {
    const arr = [];
    if (range === 'month') {
      const y = today.getFullYear(); const m = today.getMonth();
      const daysInMonth = today.getDate();
      for (let i = 1; i <= daysInMonth; i++) arr.push(fmt(new Date(y, m, i)));
    } else if (range === '30days') {
      for (let i = 29; i >= 0; i--) arr.push(fmt(addDays(today, -i)));
    } else {
      // All time: gather all dates with any entry for this pillar
      const found = new Set();
      Object.keys(entries).forEach(k => { if (entries[k][pillar.id] !== undefined) found.add(k); });
      if (pillar.isMealPillar) Object.keys(meals).forEach(k => found.add(k));
      arr.push(...Array.from(found).sort());
      if (arr.length === 0) arr.push(fmt(today));
    }
    return arr;
  }, [range, today, entries, meals, pillar]);

  // Compute stats
  const stats = useMemo(() => {
    let done = 0, skipped = 0, untracked = 0, totalMinutes = 0;
    const notes = [];
    const byWeekday = [0, 0, 0, 0, 0, 0, 0]; // Sun..Sat done counts
    const byWeekdayTotal = [0, 0, 0, 0, 0, 0, 0];
    const dayEntries = [];

    dates.forEach(k => {
      const e = entries[k]?.[pillar.id];
      const d = new Date(k + 'T00:00:00');
      const wd = d.getDay();
      byWeekdayTotal[wd]++;
      if (e === undefined) {
        untracked++;
        dayEntries.push({ date: k, status: 'untracked', minutes: 0, note: '' });
      } else if (e.done === true) {
        done++;
        totalMinutes += e.minutes || 0;
        byWeekday[wd]++;
        if (e.note) notes.push({ date: k, note: e.note });
        dayEntries.push({ date: k, status: 'done', minutes: e.minutes || 0, note: e.note || '' });
      } else if (e.done === false) {
        skipped++;
        dayEntries.push({ date: k, status: 'skipped', minutes: 0, note: e.note || '' });
      } else {
        dayEntries.push({ date: k, status: 'untracked', minutes: 0, note: '' });
        untracked++;
      }
    });

    const totalDays = dates.length;
    const pct = totalDays ? Math.round((done / totalDays) * 100) : 0;
    return { done, skipped, untracked, totalMinutes, pct, totalDays, notes, byWeekday, byWeekdayTotal, dayEntries };
  }, [dates, entries, pillar]);

  const streak = computeStreak(pillar.id);
  const isSleep = pillar.id === 'sleep';
  const isMeal = pillar.isMealPillar;
  const isGym = pillar.id === 'gym';

  // Meal-specific stats
  const mealData = useMemo(() => {
    if (!isMeal) return null;
    const allMeals = [];
    let totalScore = 0, totalMeals = 0;
    const scoreBuckets = [0, 0, 0, 0, 0]; // 1, 2, 3, 4, 5
    dates.forEach(k => {
      const dms = meals[k] || [];
      dms.forEach(m => {
        const s = m.manualScore ?? m.score;
        allMeals.push({ date: k, time: m.time, name: m.name, score: s });
        totalScore += s;
        totalMeals++;
        const bucket = Math.min(4, Math.max(0, Math.floor(s) - 1));
        scoreBuckets[bucket]++;
      });
    });
    const sorted = [...allMeals].sort((a, b) => b.score - a.score);
    return {
      totalMeals,
      avgScore: totalMeals ? totalScore / totalMeals : 0,
      scoreBuckets,
      best: sorted.slice(0, 5),
      worst: sorted.slice(-5).reverse(),
      all: allMeals.reverse(),
    };
  }, [isMeal, dates, meals]);

  // Sleep-specific stats
  const sleepData = useMemo(() => {
    if (!isSleep) return null;
    const nights = stats.dayEntries.filter(d => d.status === 'done');
    const under7 = nights.filter(n => n.minutes > 0 && n.minutes < 420).length;
    const zeroMinutes = nights.filter(n => n.minutes === 0).length;
    const validNights = nights.filter(n => n.minutes > 0);
    const avgMinutes = validNights.length ? validNights.reduce((s, n) => s + n.minutes, 0) / validNights.length : 0;
    return { under7, zeroMinutes, avgMinutes, nights };
  }, [isSleep, stats]);

  const weekdayLabels = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];

  return (
    <div style={styles.modalOverlay} className="sp-modal-overlay" onClick={onClose}>
      <div style={styles.modalSheet} className="sp-modal-sheet slide-up" onClick={e => e.stopPropagation()}>
        <div style={styles.modalHandle} />
        <div style={styles.drillHeader}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
            <span style={{ ...styles.statEmoji, background: `${pillar.color}25`, width: 40, height: 40, fontSize: 20 }}>{pillar.emoji}</span>
            <div>
              <div style={styles.drillTitle}>{pillar.name}</div>
              <div style={styles.drillSubtitle}>{stats.done} of {stats.totalDays} days</div>
            </div>
          </div>
          <button onClick={onClose} style={styles.drillClose}><X size={18} /></button>
        </div>

        <div style={styles.drillBody}>
          {/* Range toggle */}
          <div style={styles.rangeToggle}>
            {[
              { id: 'month', label: 'This month' },
              { id: '30days', label: 'Last 30 days' },
              { id: 'all', label: 'All time' },
            ].map(r => (
              <button key={r.id} onClick={() => setRange(r.id)} style={{ ...styles.rangeBtn, ...(range === r.id ? styles.rangeBtnActive : {}) }}>
                {r.label}
              </button>
            ))}
          </div>

          {/* Top stats */}
          <div style={styles.drillStatsGrid}>
            <div style={styles.drillStatBox}>
              <div style={styles.drillStatValue}>{stats.pct}<span style={styles.drillStatPct}>%</span></div>
              <div style={styles.drillStatLabel}>Consistency</div>
            </div>
            <div style={styles.drillStatBox}>
              <div style={styles.drillStatValue}>{streak}</div>
              <div style={styles.drillStatLabel}>Day streak</div>
            </div>
            {pillar.tracksTime && (
              <div style={styles.drillStatBox}>
                <div style={styles.drillStatValueSmall}>{fmtMinutes(stats.totalMinutes) || '0m'}</div>
                <div style={styles.drillStatLabel}>Total time</div>
              </div>
            )}
            {isMeal && mealData && (
              <div style={styles.drillStatBox}>
                <div style={styles.drillStatValueSmall}>{mealData.avgScore.toFixed(1)}★</div>
                <div style={styles.drillStatLabel}>Avg quality</div>
              </div>
            )}
          </div>

          {/* Day dot grid */}
          <div style={styles.drillSection}>
            <div style={styles.drillSectionTitle}>Daily log</div>
            <div style={styles.dotGrid}>
              {stats.dayEntries.map((d, i) => {
                let bg = '#E8E2D4';
                if (d.status === 'done') bg = pillar.color;
                else if (d.status === 'skipped') bg = '#D8D0BC';
                return (
                  <div key={i} title={`${d.date}: ${d.status}${d.minutes ? ` (${fmtMinutes(d.minutes)})` : ''}`} style={{ ...styles.dot, background: bg }} />
                );
              })}
            </div>
            <div style={styles.dotLegend}>
              <span><span style={{ ...styles.dotMini, background: pillar.color }} /> Done</span>
              <span><span style={{ ...styles.dotMini, background: '#D8D0BC' }} /> Skipped</span>
              <span><span style={{ ...styles.dotMini, background: '#E8E2D4' }} /> Untracked</span>
            </div>
          </div>

          {/* Sleep-specific honesty check */}
          {isSleep && sleepData && (
            <div style={styles.drillSection}>
              <div style={styles.drillSectionTitle}>Sleep honesty check</div>
              <div style={styles.honestyBox}>
                <div style={styles.honestyRow}>
                  <span>Average sleep duration</span>
                  <strong style={{ color: sleepData.avgMinutes < 420 ? '#A1402F' : '#2A6E5E' }}>{(sleepData.avgMinutes / 60).toFixed(1)}h</strong>
                </div>
                <div style={styles.honestyRow}>
                  <span>Nights under 7h (still marked done)</span>
                  <strong style={{ color: sleepData.under7 > 0 ? '#A1402F' : '#2A6E5E' }}>{sleepData.under7}</strong>
                </div>
                <div style={styles.honestyRow}>
                  <span>Nights with 0 minutes logged</span>
                  <strong style={{ color: sleepData.zeroMinutes > 0 ? '#A1402F' : '#2A6E5E' }}>{sleepData.zeroMinutes}</strong>
                </div>
                {sleepData.under7 > 0 && (
                  <div style={styles.honestyNote}>This pillar's threshold is 7+ hours. Ticking done under that isn't honest tracking.</div>
                )}
              </div>
              {/* Sleep duration mini-chart */}
              <div style={{ marginTop: 14 }}>
                <SleepBarChart nights={sleepData.nights} />
              </div>
            </div>
          )}

          {/* Gym-specific weekday vs weekend */}
          {isGym && (
            <div style={styles.drillSection}>
              <div style={styles.drillSectionTitle}>Weekday vs weekend</div>
              <WeekdayPattern byWeekday={stats.byWeekday} byWeekdayTotal={stats.byWeekdayTotal} labels={weekdayLabels} color={pillar.color} />
            </div>
          )}

          {/* Meals: full meal browser */}
          {isMeal && mealData && (
            <>
              <div style={styles.drillSection}>
                <div style={styles.drillSectionTitle}>Score distribution</div>
                <div style={styles.scoreDistRow}>
                  {[1, 2, 3, 4, 5].map((n, i) => {
                    const count = mealData.scoreBuckets[i];
                    const max = Math.max(...mealData.scoreBuckets, 1);
                    const h = (count / max) * 100;
                    return (
                      <div key={n} style={styles.scoreDistCol}>
                        <div style={styles.scoreDistBarWrap}>
                          <div style={{ ...styles.scoreDistBar, height: `${h}%`, background: n >= 4 ? '#3D8B7A' : n <= 2 ? '#D4604F' : '#C9A961' }} />
                        </div>
                        <div style={styles.scoreDistLabel}>{n}★</div>
                        <div style={styles.scoreDistCount}>{count}</div>
                      </div>
                    );
                  })}
                </div>
              </div>

              {mealData.worst.length > 0 && (
                <div style={styles.drillSection}>
                  <div style={styles.drillSectionTitle}>Worst meals</div>
                  {mealData.worst.map((m, i) => (
                    <div key={i} style={styles.mealMiniRow}>
                      <div style={styles.mealMiniDate}>{m.date}</div>
                      <div style={styles.mealMiniName}>{m.name}</div>
                      <div style={styles.mealMiniScore}>{m.score}★</div>
                    </div>
                  ))}
                </div>
              )}

              {mealData.best.length > 0 && (
                <div style={styles.drillSection}>
                  <div style={styles.drillSectionTitle}>Best meals</div>
                  {mealData.best.map((m, i) => (
                    <div key={i} style={styles.mealMiniRow}>
                      <div style={styles.mealMiniDate}>{m.date}</div>
                      <div style={styles.mealMiniName}>{m.name}</div>
                      <div style={styles.mealMiniScore}>{m.score}★</div>
                    </div>
                  ))}
                </div>
              )}
            </>
          )}

          {/* Time per day chart for time-tracked pillars */}
          {pillar.tracksTime && !isSleep && stats.totalMinutes > 0 && (
            <div style={styles.drillSection}>
              <div style={styles.drillSectionTitle}>Time per day</div>
              <TimePerDayChart entries={stats.dayEntries} color={pillar.color} />
            </div>
          )}

          {/* Notes list */}
          {stats.notes.length > 0 && (
            <div style={styles.drillSection}>
              <div style={styles.drillSectionTitle}>Notes ({stats.notes.length})</div>
              <div style={styles.notesList}>
                {stats.notes.slice().reverse().map((n, i) => (
                  <div key={i} style={styles.noteRow}>
                    <div style={styles.noteDate}>{n.date}</div>
                    <div style={styles.noteBody}>{n.note}</div>
                  </div>
                ))}
              </div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

function SleepBarChart({ nights }) {
  const recent = nights.slice(-14); // last 14 nights
  if (recent.length === 0) return null;
  const threshold = 420; // 7 hours in minutes
  const max = Math.max(...recent.map(n => n.minutes), 540);
  return (
    <div style={styles.sleepChart}>
      <div style={styles.sleepBars}>
        {recent.map((n, i) => {
          const h = (n.minutes / max) * 100;
          const meets = n.minutes >= threshold;
          return (
            <div key={i} style={styles.sleepBarCol} title={`${n.date}: ${(n.minutes/60).toFixed(1)}h`}>
              <div style={styles.sleepBarWrap}>
                <div style={{ ...styles.sleepBar, height: `${h}%`, background: meets ? '#6B7FBF' : '#D4604F' }} />
                <div style={styles.sleepThreshold} />
              </div>
            </div>
          );
        })}
      </div>
      <div style={styles.sleepChartLegend}>
        <span>Last {recent.length} nights · dashed line = 7h</span>
      </div>
    </div>
  );
}

function WeekdayPattern({ byWeekday, byWeekdayTotal, labels, color }) {
  return (
    <div style={styles.weekdayGrid}>
      {labels.map((lbl, i) => {
        const done = byWeekday[i];
        const total = byWeekdayTotal[i];
        const pct = total ? Math.round((done / total) * 100) : 0;
        return (
          <div key={i} style={styles.weekdayCol}>
            <div style={styles.weekdayLabel}>{lbl}</div>
            <div style={styles.weekdayBarWrap}>
              <div style={{ ...styles.weekdayBar, height: `${pct}%`, background: color }} />
            </div>
            <div style={styles.weekdayPct}>{pct}%</div>
            <div style={styles.weekdayCount}>{done}/{total}</div>
          </div>
        );
      })}
    </div>
  );
}

function TimePerDayChart({ entries, color }) {
  const recent = entries.slice(-14);
  const max = Math.max(...recent.map(e => e.minutes), 1);
  return (
    <div style={styles.sleepChart}>
      <div style={styles.sleepBars}>
        {recent.map((e, i) => {
          const h = e.minutes ? (e.minutes / max) * 100 : 0;
          return (
            <div key={i} style={styles.sleepBarCol} title={`${e.date}: ${fmtMinutes(e.minutes) || 'none'}`}>
              <div style={styles.sleepBarWrap}>
                <div style={{ ...styles.sleepBar, height: `${h}%`, background: color }} />
              </div>
            </div>
          );
        })}
      </div>
      <div style={styles.sleepChartLegend}>
        <span>Last {recent.length} days</span>
      </div>
    </div>
  );
}

function Sparkline({ data, pillars }) {
  const max = pillars.length;
  const w = 280, h = 60, pad = 4;
  const stepX = (w - pad * 2) / (data.length - 1);
  const points = data.map((d, i) => {
    const x = pad + i * stepX;
    const y = h - pad - ((d.doneCount / max) * (h - pad * 2));
    return `${x},${y}`;
  }).join(' ');
  const areaPath = `M${pad},${h - pad} L${points.replace(/ /g, ' L')} L${w - pad},${h - pad} Z`;
  return (
    <svg viewBox={`0 0 ${w} ${h}`} style={{ width: '100%', height: 60, marginTop: 12 }}>
      <path d={areaPath} fill="#1F1B1410" />
      <polyline points={points} fill="none" stroke="#1F1B14" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" />
      {data.map((d, i) => {
        const x = pad + i * stepX;
        const y = h - pad - ((d.doneCount / max) * (h - pad * 2));
        const isToday = i === data.length - 1;
        return isToday ? <circle key={i} cx={x} cy={y} r="3" fill="#FF6B4A" /> : null;
      })}
    </svg>
  );
}

function CalendarView({ pillars, entries, selectedDate, setSelectedDate, setView, today }) {
  const [viewMonth, setViewMonth] = useState(new Date(selectedDate.getFullYear(), selectedDate.getMonth(), 1));
  const year = viewMonth.getFullYear(); const month = viewMonth.getMonth();
  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const monthName = viewMonth.toLocaleDateString('en-GB', { month: 'long', year: 'numeric' });
  const cells = [];
  for (let i = 0; i < firstDay; i++) cells.push(null);
  for (let d = 1; d <= daysInMonth; d++) cells.push(d);
  return (
    <div className="fade-in">
      <div style={styles.calNav}>
        <button style={styles.navBtn} onClick={() => setViewMonth(new Date(year, month - 1, 1))}><ChevronLeft size={18} /></button>
        <div style={styles.calMonthLabel}>{monthName}</div>
        <button style={styles.navBtn} onClick={() => setViewMonth(new Date(year, month + 1, 1))}><ChevronRight size={18} /></button>
      </div>
      <div style={styles.calGrid}>
        {['S', 'M', 'T', 'W', 'T', 'F', 'S'].map((d, i) => <div key={i} style={styles.calDayLabel}>{d}</div>)}
        {cells.map((d, i) => {
          if (d === null) return <div key={i} />;
          const date = startOfDay(new Date(year, month, d));
          const k = fmt(date);
          const dayEntry = entries[k] || {};
          const done = pillars.filter(p => dayEntry[p.id]?.done === true).length;
          const isToday = sameDay(date, today);
          const isFuture = dayCompare(date, today) > 0;
          const isSelected = sameDay(date, selectedDate);
          return (
            <button key={i} onClick={() => { setSelectedDate(date); setView('today'); }} disabled={isFuture}
              style={{
                ...styles.calCell,
                opacity: isFuture ? 0.3 : 1,
                background: isSelected ? '#1F1B14' : 'transparent',
                color: isSelected ? '#F7F2E7' : '#1F1B14',
                border: isToday && !isSelected ? '1.5px solid #1F1B14' : '1.5px solid transparent',
              }}>
              <span style={styles.calNum}>{d}</span>
              {!isFuture && done > 0 && (
                <div style={styles.calDots}>
                  {Array.from({ length: pillars.length }).map((_, idx) => (
                    <div key={idx} style={{ ...styles.calDot, background: idx < done ? (isSelected ? '#F7F2E7' : '#1F1B14') : (isSelected ? '#F7F2E740' : '#1F1B1420') }} />
                  ))}
                </div>
              )}
            </button>
          );
        })}
      </div>
      <div style={styles.calLegend}>Tap a day to view or edit it</div>
    </div>
  );
}

function SettingsView({ pillars, savePillars, exportData, importData }) {
  const [editing, setEditing] = useState(null);
  const [newPillar, setNewPillar] = useState({ name: '', emoji: '✨', tracksTime: true });
  const fileInputRef = useRef(null);

  const updatePillar = (id, patch) => savePillars(pillars.map(p => p.id === id ? { ...p, ...patch } : p));
  const removePillar = (id) => { if (pillars.length <= 1) return; savePillars(pillars.filter(p => p.id !== id)); };
  const addPillar = () => {
    if (!newPillar.name.trim()) return;
    const colors = ['#5B6CFF', '#FF6B4A', '#8B5A3C', '#6B7FBF', '#C9A961', '#3D8B7A', '#D4604F', '#9B59B6'];
    savePillars([...pillars, {
      id: `custom_${Date.now()}`, name: newPillar.name.trim(),
      emoji: newPillar.emoji || '✨', color: colors[pillars.length % colors.length],
      tracksTime: newPillar.tracksTime,
    }]);
    setNewPillar({ name: '', emoji: '✨', tracksTime: true });
  };

  const handleImportClick = () => fileInputRef.current?.click();
  const handleFileChange = (e) => {
    const file = e.target.files?.[0];
    if (file) importData(file);
    e.target.value = ''; // reset so re-importing same file works
  };

  return (
    <div className="fade-in">
      <div style={styles.sectionTitle}>Backup & restore</div>
      <div style={{ marginBottom: 10 }} className="sp-backup-row">
        <button onClick={exportData} style={styles.backupBtn}>
          <Download size={14} />
          <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'flex-start' }}>
            <span style={styles.backupBtnLabel}>Export backup</span>
            <span style={styles.backupBtnHint}>Download a .json file</span>
          </div>
        </button>
        <button onClick={handleImportClick} style={styles.backupBtn}>
          <Upload size={14} />
          <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'flex-start' }}>
            <span style={styles.backupBtnLabel}>Import backup</span>
            <span style={styles.backupBtnHint}>Restore from .json</span>
          </div>
        </button>
        <input ref={fileInputRef} type="file" accept=".json,application/json" onChange={handleFileChange} style={{ display: 'none' }} />
      </div>
      <div style={styles.backupNote}>
        Imports merge with existing data — they don't overwrite logs from other days. Same-day entries will be replaced by the imported version.
      </div>

      <div style={styles.sectionTitle}>Your pillars</div>
      <div style={styles.settingsList}>
        {pillars.map(p => (
          <div key={p.id} style={styles.settingsRow}>
            {editing === p.id ? (
              <>
                <input type="text" value={p.emoji} onChange={e => updatePillar(p.id, { emoji: e.target.value })} style={styles.settingsEmojiInput} maxLength={2} />
                <input type="text" value={p.name} onChange={e => updatePillar(p.id, { name: e.target.value })} style={styles.settingsNameInput} autoFocus />
                <button style={styles.settingsDoneBtn} onClick={() => setEditing(null)}>Done</button>
              </>
            ) : (
              <>
                <span style={{ ...styles.settingsEmoji, background: `${p.color}20` }}>{p.emoji}</span>
                <div style={{ flex: 1, display: 'flex', flexDirection: 'column' }}>
                  <span style={styles.settingsName}>{p.name}</span>
                  <span style={styles.settingsHint}>
                    {p.tracksTime ? '⏱ tracks time' : ''}{p.tracksTime && p.isMealPillar ? ' · ' : ''}{p.isMealPillar ? '🍽 meal log' : ''}
                  </span>
                </div>
                <button style={styles.settingsIconBtn} onClick={() => setEditing(p.id)}><Edit3 size={14} /></button>
                <button style={styles.settingsIconBtn} onClick={() => removePillar(p.id)} disabled={pillars.length <= 1}><Trash2 size={14} /></button>
              </>
            )}
          </div>
        ))}
      </div>

      <div style={styles.sectionTitle}>Add a pillar</div>
      <div style={styles.addRow}>
        <input type="text" value={newPillar.emoji} onChange={e => setNewPillar({ ...newPillar, emoji: e.target.value })} style={styles.settingsEmojiInput} maxLength={2} placeholder="✨" />
        <input type="text" value={newPillar.name} onChange={e => setNewPillar({ ...newPillar, name: e.target.value })} placeholder="e.g. Drink water" style={styles.settingsNameInput} onKeyDown={e => e.key === 'Enter' && addPillar()} />
        <button style={styles.addBtn} onClick={addPillar}><Plus size={16} /></button>
      </div>
      <label style={styles.timeToggle}>
        <input type="checkbox" checked={newPillar.tracksTime} onChange={e => setNewPillar({ ...newPillar, tracksTime: e.target.checked })} />
        <span>Track time spent on this habit</span>
      </label>

      <div style={styles.aboutBox}>
        <div style={styles.aboutTitle}>Six Pillars</div>
        <div style={styles.aboutText}>
          A digital evolution of your printed tracking sheet. Tap a pillar once to mark done, again for skipped, again to clear. Each pillar can record minutes spent and an optional note. Healthy Eating opens a meal log where each entry gets an auto 1–5 star score you can override. Export regularly to keep a permanent backup of your data.
        </div>
      </div>
    </div>
  );
}
